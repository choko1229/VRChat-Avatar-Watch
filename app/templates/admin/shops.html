{% extends "admin/_layout.html" %}
{% block admin_content %}
<h1>ショップ管理</h1>
<table><tr><th>名前</th><th>URL</th><th>監視</th><th>除外</th><th>保存</th></tr>
{% for shop in shops %}
<tr>
  <form method="post" action="/admin/shops/{{ shop.id }}">
    <input type="hidden" name="csrf" value="{{ csrf_token }}">
    <td>{{ shop.name }}</td><td>{{ shop.shop_url }}</td>
    <td><input type="checkbox" name="is_watch_enabled" {% if shop.is_watch_enabled %}checked{% endif %}></td>
    <td><input type="checkbox" name="is_excluded" {% if shop.is_excluded %}checked{% endif %}></td>
    <td><button class="button" type="submit">保存</button></td>
  </form>
</tr>
{% endfor %}
</table>
{% endblock %}
