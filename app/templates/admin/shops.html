{% extends "admin/_layout.html" %}
{% block admin_content %}
<h1>ショップ管理</h1>
<table>
  <tr><th>名前</th><th>URL</th><th>監視</th><th>除外</th><th>操作</th></tr>
  {% for shop in shops %}
  <tr>
    <form id="shop-save-{{ shop.id }}" method="post" action="/admin/shops/{{ shop.id }}">
      <input type="hidden" name="csrf" value="{{ csrf_token }}">
    </form>
    <td>{{ shop.name }}</td><td>{{ shop.shop_url }}</td>
    <td><input form="shop-save-{{ shop.id }}" type="checkbox" name="is_watch_enabled" {% if shop.is_watch_enabled %}checked{% endif %}></td>
    <td><input form="shop-save-{{ shop.id }}" type="checkbox" name="is_excluded" {% if shop.is_excluded %}checked{% endif %}></td>
    <td class="actions">
      <button form="shop-save-{{ shop.id }}" class="button" type="submit">保存</button>
      <form method="post" action="/admin/shops/{{ shop.id }}/delete" onsubmit="return confirm('このショップを削除します。商品自体は残し、ショップ紐付けだけ外します。よろしいですか？');">
        <input type="hidden" name="csrf" value="{{ csrf_token }}">
        <button class="button danger" type="submit">削除</button>
      </form>
    </td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
