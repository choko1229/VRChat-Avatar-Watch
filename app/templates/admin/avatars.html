{% extends "admin/_layout.html" %}
{% block admin_content %}
<h1>アバター管理</h1>
<table><tr><th>名前</th><th>slug</th><th>画像URL</th><th>BOOTH URL</th><th>保存</th></tr>
{% for avatar in avatars %}
<tr>
  <form method="post" action="/admin/avatars/{{ avatar.id }}">
    <input type="hidden" name="csrf" value="{{ csrf_token }}">
    <td>{{ avatar.name }}</td><td>{{ avatar.slug }}</td>
    <td><input name="image_url" value="{{ avatar.image_url or '' }}"></td>
    <td><input name="booth_url" value="{{ avatar.booth_url or '' }}"></td>
    <td><button class="button" type="submit">保存</button></td>
  </form>
</tr>
{% endfor %}</table>
{% endblock %}
