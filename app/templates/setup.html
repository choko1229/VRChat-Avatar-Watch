{% extends "base.html" %}
{% block content %}
<section class="section narrow">
  <h1>初回セットアップ</h1>
  <form class="stack-form" method="post" action="/setup">
    <input type="hidden" name="csrf" value="{{ csrf_token }}">
    <h2>MySQL</h2>
    <input name="mysql_host" placeholder="MySQL host" required>
    <input name="mysql_port" placeholder="3306" value="3306">
    <input name="mysql_database" placeholder="database" required>
    <input name="mysql_user" placeholder="user" required>
    <input name="mysql_password" placeholder="password" type="password">
    <h2>Discord OAuth</h2>
    <input name="discord_client_id" placeholder="Client ID">
    <input name="discord_client_secret" placeholder="Client Secret" type="password">
    <input name="discord_redirect_uri" placeholder="https://example.com/auth/discord/callback">
    <input name="admin_discord_id" placeholder="管理者Discord ID">
    <h2>サイト・クロール</h2>
    <input name="site_name" value="VRChat Avatar Watch">
    <input name="crawl_interval_hours" value="6">
    <h2>通知下地</h2>
    <input name="misskey_instance_url" placeholder="Misskey URL">
    <input name="misskey_token" placeholder="Misskey token" type="password">
    <input name="discord_webhook_admin" placeholder="Admin Discord webhook" type="password">
    <input name="discord_webhook_public" placeholder="Public Discord webhook" type="password">
    <button class="button primary" type="submit">保存して管理画面へ</button>
  </form>
</section>
{% endblock %}
